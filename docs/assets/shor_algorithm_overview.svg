<svg xmlns="http://www.w3.org/2000/svg" width="1500" height="900" viewBox="0 0 1500 900" role="img" aria-labelledby="title desc">
  <title id="title">Shor 算法从整数分解到周期寻找的流程图</title>
  <desc id="desc">图示 Shor 算法把整数分解问题转化为模指数函数的周期寻找问题，通过量子相位估计和逆量子傅里叶变换得到周期，再用经典最大公约数恢复因子。</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#f8fbff"/>
      <stop offset="1" stop-color="#fffaf4"/>
    </linearGradient>
    <linearGradient id="quantum" x1="0" x2="1">
      <stop offset="0" stop-color="#eef6ff"/>
      <stop offset="1" stop-color="#f4efff"/>
    </linearGradient>
    <linearGradient id="classic" x1="0" x2="1">
      <stop offset="0" stop-color="#f7fff4"/>
      <stop offset="1" stop-color="#fffdf2"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="4" stdDeviation="4" flood-color="#0f172a" flood-opacity="0.12"/>
    </filter>
    <marker id="arrowBlue" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 z" fill="#2563eb"/>
    </marker>
    <marker id="arrowGreen" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 z" fill="#16a34a"/>
    </marker>
    <marker id="arrowGray" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 z" fill="#475569"/>
    </marker>
    <style>
      .title { font: 800 38px system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #0f172a; }
      .subtitle { font: 500 17px system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #475569; }
      .h { font: 800 22px system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #111827; }
      .t { font: 500 16px system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #263241; }
      .small { font: 500 14px system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #526070; }
      .mono { font: 700 17px ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; fill: #111827; }
      .monoSmall { font: 600 14px ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; fill: #334155; }
      .box { fill: #ffffff; stroke: #cbd5e1; stroke-width: 1.5; rx: 14; filter: url(#shadow); }
      .qbox { fill: url(#quantum); stroke: #93c5fd; stroke-width: 1.8; rx: 14; filter: url(#shadow); }
      .cbox { fill: url(#classic); stroke: #a7d489; stroke-width: 1.8; rx: 14; filter: url(#shadow); }
      .warn { fill: #fff7ed; stroke: #fdba74; stroke-width: 1.5; rx: 12; }
      .blue { fill: #2563eb; stroke: #2563eb; }
      .purple { fill: #7c3aed; stroke: #7c3aed; }
      .green { fill: #16a34a; stroke: #16a34a; }
      .orange { fill: #f59e0b; stroke: #f59e0b; }
      .red { fill: #dc2626; stroke: #dc2626; }
      .wire { stroke: #2563eb; stroke-width: 3; fill: none; marker-end: url(#arrowBlue); }
      .wireG { stroke: #16a34a; stroke-width: 3; fill: none; marker-end: url(#arrowGreen); }
      .wireGray { stroke: #475569; stroke-width: 2.5; fill: none; marker-end: url(#arrowGray); }
      .grid { stroke: #e2e8f0; stroke-width: 1; }
    </style>
  </defs>

  <rect width="1500" height="900" fill="url(#bg)"/>
  <text class="title" x="750" y="52" text-anchor="middle">Shor 算法：把整数分解变成周期寻找</text>
  <text class="subtitle" x="750" y="82" text-anchor="middle">经典部分负责随机选数、gcd 和分数恢复；量子部分负责加速寻找模指数函数的周期 r。</text>

  <rect class="cbox" x="45" y="125" width="255" height="145"/>
  <text class="h" x="72" y="162">1. 输入合数 N</text>
  <text class="t" x="72" y="196">目标：找到非平凡因子</text>
  <text class="mono" x="72" y="232">N = 15</text>
  <text class="small" x="72" y="254">示例因子应为 3 和 5</text>

  <path class="wireG" d="M300 198 H360"/>
  <rect class="cbox" x="360" y="125" width="285" height="145"/>
  <text class="h" x="388" y="162">2. 随机选 a</text>
  <text class="t" x="388" y="196">要求：1 &lt; a &lt; N</text>
  <text class="mono" x="388" y="228">a = 2</text>
  <text class="small" x="388" y="254">若 gcd(a, N) &gt; 1，直接得到因子</text>

  <path class="wireG" d="M645 198 H705"/>
  <rect class="cbox" x="705" y="125" width="330" height="145"/>
  <text class="h" x="733" y="162">3. 转成阶寻找</text>
  <text class="t" x="733" y="196">找最小正整数 r，使得</text>
  <text class="mono" x="733" y="228">a^r ≡ 1 (mod N)</text>
  <text class="small" x="733" y="254">r 是模指数函数的周期</text>

  <path class="wireG" d="M1035 198 H1095"/>
  <rect class="cbox" x="1095" y="125" width="355" height="145"/>
  <text class="h" x="1123" y="162">4. 由 r 恢复因子</text>
  <text class="t" x="1123" y="196">若 r 为偶数且 a^(r/2) ≠ -1 mod N</text>
  <text class="monoSmall" x="1123" y="228">gcd(a^(r/2)-1, N)</text>
  <text class="monoSmall" x="1123" y="252">gcd(a^(r/2)+1, N)</text>

  <rect class="qbox" x="110" y="335" width="1280" height="285"/>
  <text class="h" x="140" y="372">量子子程序：用 QPE 找周期 r</text>
  <text class="subtitle" x="140" y="398">Shor 算法真正的量子加速来自这里：相位估计能高效抽取 Uₐ 的本征相位，从而恢复 r。</text>

  <rect class="box" x="145" y="435" width="230" height="130"/>
  <text class="h" x="168" y="466">A. 两个寄存器</text>
  <text class="t" x="168" y="497">计数寄存器：叠加 x</text>
  <text class="t" x="168" y="525">工作寄存器：保存 a^x mod N</text>
  <text class="monoSmall" x="168" y="550">|0...0⟩ |1⟩</text>

  <path class="wire" d="M375 500 H425"/>
  <rect class="box" x="425" y="435" width="230" height="130"/>
  <text class="h" x="448" y="466">B. Hadamard</text>
  <text class="t" x="448" y="497">计数寄存器进入均匀叠加</text>
  <text class="monoSmall" x="448" y="528">Σ_x |x⟩ |1⟩</text>
  <text class="small" x="448" y="552">同时查询多个指数 x 的相位结构</text>

  <path class="wire" d="M655 500 H705"/>
  <rect class="box" x="705" y="435" width="270" height="130"/>
  <text class="h" x="728" y="466">C. 模指数运算</text>
  <text class="t" x="728" y="497">可逆计算函数</text>
  <text class="monoSmall" x="728" y="526">f(x)=a^x mod N</text>
  <text class="small" x="728" y="552">等价于 controlled-Uₐ^(2^k)</text>

  <path class="wire" d="M975 500 H1025"/>
  <rect class="box" x="1025" y="435" width="160" height="130"/>
  <text class="h" x="1048" y="466">D. 逆 QFT</text>
  <text class="t" x="1048" y="497">把相位峰值</text>
  <text class="t" x="1048" y="525">转成 bitstring</text>

  <path class="wire" d="M1185 500 H1235"/>
  <rect class="box" x="1235" y="435" width="125" height="130"/>
  <text class="h" x="1258" y="466">E. 测量</text>
  <text class="t" x="1258" y="500">得到 y</text>
  <text class="monoSmall" x="1258" y="530">y / 2^t ≈ s / r</text>

  <rect class="warn" x="185" y="635" width="1130" height="88"/>
  <text class="h" x="215" y="670">关键桥梁：相位估计得到的是 s/r 的近似值，不是直接得到 r</text>
  <text class="t" x="215" y="703">经典后处理用连分数把 y / 2^t 还原成分母 r，再验证 a^r ≡ 1 (mod N)。如果失败，重新采样或重新选择 a。</text>

  <rect class="cbox" x="75" y="765" width="320" height="95"/>
  <text class="h" x="100" y="798">示例：N=15, a=2</text>
  <text class="monoSmall" x="100" y="829">2^1=2, 2^2=4, 2^3=8, 2^4=16≡1</text>
  <text class="t" x="100" y="852">所以周期 r = 4</text>

  <path class="wireG" d="M395 812 H465"/>
  <rect class="cbox" x="465" y="765" width="360" height="95"/>
  <text class="h" x="490" y="798">由周期恢复因子</text>
  <text class="monoSmall" x="490" y="829">a^(r/2) = 2^2 = 4</text>
  <text class="monoSmall" x="490" y="852">gcd(4-1,15)=3, gcd(4+1,15)=5</text>

  <path class="wireG" d="M825 812 H895"/>
  <rect class="cbox" x="895" y="765" width="280" height="95"/>
  <text class="h" x="920" y="798">输出</text>
  <text class="mono" x="920" y="834">15 = 3 × 5</text>

  <rect class="box" x="1215" y="752" width="235" height="122"/>
  <text class="h" x="1238" y="785">为什么威胁 RSA？</text>
  <text class="small" x="1238" y="813">RSA 依赖大整数分解困难。</text>
  <text class="small" x="1238" y="838">容错大规模量子计算机上，</text>
  <text class="small" x="1238" y="863">Shor 可多项式时间分解。</text>

  <path class="wireGray" d="M865 270 C865 305 745 300 745 335"/>
  <text class="small" x="750" y="308">困难部分交给量子子程序</text>
</svg>
