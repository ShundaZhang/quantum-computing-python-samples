<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="980" viewBox="0 0 1600 980" role="img" aria-labelledby="title desc">
  <title id="title">BB84 量子密钥分发协议全过程</title>
  <desc id="desc">图示 Alice 准备随机比特和随机基，Bob 随机选择测量基，双方公开比较基并筛选密钥，随后抽样估计误码率，检测 Eve 截获重发攻击，最后进行隐私放大得到最终密钥。</desc>
  <defs>
    <linearGradient id="aliceBg" x1="0" x2="1">
      <stop offset="0" stop-color="#fff8ff"/>
      <stop offset="1" stop-color="#fbf5ff"/>
    </linearGradient>
    <linearGradient id="bobBg" x1="0" x2="1">
      <stop offset="0" stop-color="#f4fbff"/>
      <stop offset="1" stop-color="#f7fcff"/>
    </linearGradient>
    <linearGradient id="greenBg" x1="0" x2="1">
      <stop offset="0" stop-color="#f7fff7"/>
      <stop offset="1" stop-color="#fbfffb"/>
    </linearGradient>
    <linearGradient id="redBg" x1="0" x2="1">
      <stop offset="0" stop-color="#fff6f6"/>
      <stop offset="1" stop-color="#fffafa"/>
    </linearGradient>
    <filter id="shadow" x="-5%" y="-10%" width="110%" height="120%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-color="#000" flood-opacity="0.12"/>
    </filter>
    <style>
      .title { font: 800 38px system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #101426; letter-spacing: 1px; }
      .section-title { font: 700 21px system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #111827; }
      .label { font: 700 18px system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #111827; }
      .small { font: 500 15px system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #273044; }
      .tiny { font: 500 13px system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #475569; }
      .bit { font: 700 24px ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; fill: #111827; text-anchor: middle; dominant-baseline: middle; }
      .keybit { font: 800 25px ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; fill: #04720f; text-anchor: middle; dominant-baseline: middle; }
      .blue { fill: #0969da; stroke: #0969da; }
      .purple { fill: #6f2dbd; stroke: #6f2dbd; }
      .green { fill: #2e7d32; stroke: #2e7d32; }
      .red { fill: #d1242f; stroke: #d1242f; }
      .orange { fill: #ffb020; stroke: #f59e0b; }
      .line { stroke: #d7dde8; stroke-width: 1; }
      .dash { stroke: #f59e0b; stroke-width: 2; stroke-dasharray: 14 12; fill: none; }
      .box { fill: #ffffff; stroke: #d7dde8; stroke-width: 1.2; rx: 8; }
      .keepBox { fill: #f1fff3; stroke: #89c889; stroke-width: 1.5; rx: 4; }
      .softBox { fill: rgba(255,255,255,0.85); stroke: #cbd5e1; stroke-width: 1.2; rx: 8; }
    </style>
  </defs>

  <rect x="0" y="0" width="1600" height="980" fill="#ffffff"/>
  <text class="title" x="800" y="48" text-anchor="middle">BB84 量子密钥分发协议全过程</text>

  <rect x="1035" y="14" width="430" height="78" class="softBox" filter="url(#shadow)"/>
  <text class="label" x="1100" y="40">＋ 直线基 (+)</text>
  <text class="small" x="1110" y="70">垂直 = 0，水平 = 1</text>
  <text class="label purple" x="1300" y="40">× 对角基 (×)</text>
  <text class="small" x="1307" y="70">45° = 0，135° = 1</text>

  <!-- Section 1 Alice -->
  <rect x="25" y="96" width="1370" height="185" rx="8" fill="url(#aliceBg)" stroke="#c7a2ef" stroke-width="1.5"/>
  <circle cx="48" cy="120" r="17" fill="#6f2dbd"/>
  <text x="48" y="126" text-anchor="middle" font-size="20" font-weight="800" fill="#fff">1</text>
  <text class="section-title" x="78" y="155">Alice 准备</text>
  <text class="small" x="78" y="185">随机比特和随机基，</text>
  <text class="small" x="78" y="212">并发送量子态</text>
  <text class="section-title purple" x="220" y="230">Alice</text>

  <!-- Section 2 Bob -->
  <rect x="25" y="328" width="1370" height="145" rx="8" fill="url(#bobBg)" stroke="#8fc5f7" stroke-width="1.5"/>
  <circle cx="48" cy="352" r="17" fill="#0969da"/>
  <text x="48" y="358" text-anchor="middle" font-size="20" font-weight="800" fill="#fff">2</text>
  <text class="section-title" x="78" y="382">Bob 随机选择</text>
  <text class="small" x="78" y="410">测量基并测量</text>
  <text class="small" x="78" y="438">收到的量子态</text>
  <text class="section-title blue" x="220" y="422">Bob</text>

  <!-- Section 3 compare -->
  <rect x="25" y="482" width="1370" height="110" rx="8" fill="#f8fbff" stroke="#8fc5f7" stroke-width="1.5"/>
  <circle cx="48" cy="506" r="17" fill="#0969da"/>
  <text x="48" y="512" text-anchor="middle" font-size="20" font-weight="800" fill="#fff">3</text>
  <text class="section-title" x="78" y="530">Alice 和 Bob</text>
  <text class="small" x="78" y="558">公开比较基</text>
  <text class="small" x="78" y="580">但不公开比特</text>

  <!-- Section 4 key -->
  <rect x="25" y="602" width="1370" height="110" rx="8" fill="#f7fcff" stroke="#8fc5f7" stroke-width="1.5"/>
  <circle cx="48" cy="626" r="17" fill="#0969da"/>
  <text x="48" y="632" text-anchor="middle" font-size="20" font-weight="800" fill="#fff">4</text>
  <text class="section-title" x="78" y="646">提取原始密钥</text>
  <text class="small" x="78" y="676">只保留基一致的位置</text>

  <!-- Section 5 no Eve -->
  <rect x="25" y="724" width="1538" height="92" rx="8" fill="url(#greenBg)" stroke="#9bd39c" stroke-width="1.5"/>
  <circle cx="48" cy="748" r="17" fill="#4caf50"/>
  <text x="48" y="754" text-anchor="middle" font-size="18" font-weight="800" fill="#fff">5a</text>
  <text class="section-title" x="78" y="748">无窃听时</text>
  <text class="small" x="78" y="778">抽样校验误码率低，密钥有效</text>
  <rect x="300" y="733" width="690" height="70" rx="8" fill="#fff" stroke="#8bc48a"/>
  <text class="section-title" x="645" y="773" text-anchor="middle">Alice 和 Bob 公开一部分保留位进行比对</text>
  <path d="M1010 768 L1118 768" stroke="#4caf50" stroke-width="3" marker-end="url(#arrowGreen)"/>
  <text class="section-title green" x="1138" y="758">误码率 ≈ 0</text>
  <text class="section-title green" x="1138" y="786">信道安全，继续使用密钥</text>

  <!-- Section 5 Eve -->
  <rect x="25" y="828" width="1538" height="104" rx="8" fill="url(#redBg)" stroke="#ff9b9b" stroke-width="1.5"/>
  <circle cx="48" cy="852" r="17" fill="#d1242f"/>
  <text x="48" y="858" text-anchor="middle" font-size="18" font-weight="800" fill="#fff">5b</text>
  <text class="section-title" x="78" y="848">有窃听时 (Eve)</text>
  <text class="small" x="78" y="878">截获测量会扰动量子态，</text>
  <text class="small" x="78" y="906">导致误码率升高</text>
  <rect x="300" y="842" width="1050" height="76" rx="8" fill="#fffafa" stroke="#ff6666" stroke-dasharray="7 5"/>
  <text class="label red" x="320" y="867">Eve 截获重发</text>
  <text class="tiny" x="320" y="892">随机选基测量，再把新量子态发给 Bob</text>
  <text class="section-title blue" x="1128" y="886">Bob</text>
  <path d="M975 880 L1110 880" stroke="#111827" stroke-width="2.5" marker-end="url(#arrowBlack)"/>
  <text class="label red" x="1410" y="866">误码率显著升高</text>
  <text class="label red" x="1410" y="895">检测到窃听，密钥作废</text>

  <!-- Section 6 privacy amplification -->
  <rect x="25" y="944" width="1538" height="30" rx="8" fill="#f6fff7" stroke="#9bd39c" stroke-width="1.3"/>
  <text class="section-title green" x="48" y="966">6 隐私放大：把原始密钥压缩成更短但更安全的最终密钥，用于 AES 或一次一密等后续加密。</text>

  <defs>
    <marker id="arrowOrange" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 z" fill="#f59e0b"/>
    </marker>
    <marker id="arrowGreen" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 z" fill="#4caf50"/>
    </marker>
    <marker id="arrowBlack" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 z" fill="#111827"/>
    </marker>
  </defs>

  <!-- Grid and data columns -->
  <g transform="translate(300 112)">
    <text class="label" x="0" y="20">随机比特</text>
    <text class="label" x="0" y="66">选择的基</text>
    <text class="label" x="0" y="112">发送的量子态</text>
    <text class="tiny" x="0" y="136">(偏振方向)</text>
    <g class="line">
      <line x1="118" y1="-16" x2="118" y2="148"/>
      <line x1="203" y1="-16" x2="203" y2="148"/>
      <line x1="288" y1="-16" x2="288" y2="148"/>
      <line x1="373" y1="-16" x2="373" y2="148"/>
      <line x1="458" y1="-16" x2="458" y2="148"/>
      <line x1="543" y1="-16" x2="543" y2="148"/>
      <line x1="628" y1="-16" x2="628" y2="148"/>
      <line x1="713" y1="-16" x2="713" y2="148"/>
      <line x1="798" y1="-16" x2="798" y2="148"/>
      <line x1="883" y1="-16" x2="883" y2="148"/>
      <line x1="968" y1="-16" x2="968" y2="148"/>
      <line x1="1053" y1="-16" x2="1053" y2="148"/>
      <line x1="0" y1="35" x2="1088" y2="35"/>
      <line x1="0" y1="82" x2="1088" y2="82"/>
    </g>
    <g>
      <text class="bit" x="160" y="15">0</text>
      <text class="bit" x="245" y="15">1</text>
      <text class="bit" x="330" y="15">0</text>
      <text class="bit" x="415" y="15">1</text>
      <text class="bit" x="500" y="15">1</text>
      <text class="bit" x="585" y="15">1</text>
      <text class="bit" x="670" y="15">0</text>
      <text class="bit" x="755" y="15">0</text>
      <text class="bit" x="840" y="15">1</text>
      <text class="bit" x="925" y="15">1</text>
      <text class="bit" x="1010" y="15">0</text>
      <text class="bit" x="1095" y="15">0</text>
      <text class="bit blue" x="160" y="62">＋</text>
      <text class="bit purple" x="245" y="62">×</text>
      <text class="bit blue" x="330" y="62">＋</text>
      <text class="bit blue" x="415" y="62">＋</text>
      <text class="bit purple" x="500" y="62">×</text>
      <text class="bit blue" x="585" y="62">＋</text>
      <text class="bit purple" x="670" y="62">×</text>
      <text class="bit purple" x="755" y="62">×</text>
      <text class="bit blue" x="840" y="62">＋</text>
      <text class="bit purple" x="925" y="62">×</text>
      <text class="bit blue" x="1010" y="62">＋</text>
      <text class="bit purple" x="1095" y="62">×</text>
      <text class="bit blue" x="160" y="112">↑</text>
      <text class="bit purple" x="245" y="112">↗</text>
      <text class="bit blue" x="330" y="112">↑</text>
      <text class="bit blue" x="415" y="112">→</text>
      <text class="bit purple" x="500" y="112">↘</text>
      <text class="bit blue" x="585" y="112">→</text>
      <text class="bit purple" x="670" y="112">↗</text>
      <text class="bit purple" x="755" y="112">↙</text>
      <text class="bit blue" x="840" y="112">→</text>
      <text class="bit purple" x="925" y="112">↘</text>
      <text class="bit blue" x="1010" y="112">↑</text>
      <text class="bit purple" x="1095" y="112">↙</text>
    </g>
  </g>

  <path class="dash" d="M310 297 H1390" marker-end="url(#arrowOrange)"/>
  <text class="small" x="795" y="318" text-anchor="middle">量子信道（光子传输）</text>
  <circle class="orange" cx="345" cy="297" r="9"/>
  <circle class="orange" cx="430" cy="297" r="9"/>
  <circle class="orange" cx="515" cy="297" r="9"/>
  <circle class="orange" cx="600" cy="297" r="9"/>
  <circle class="orange" cx="685" cy="297" r="9"/>
  <circle class="orange" cx="770" cy="297" r="9"/>
  <circle class="orange" cx="855" cy="297" r="9"/>
  <circle class="orange" cx="940" cy="297" r="9"/>
  <circle class="orange" cx="1025" cy="297" r="9"/>
  <circle class="orange" cx="1110" cy="297" r="9"/>
  <circle class="orange" cx="1195" cy="297" r="9"/>
  <circle class="orange" cx="1280" cy="297" r="9"/>

  <g transform="translate(300 345)">
    <text class="label" x="0" y="18">Bob 选择的基</text>
    <text class="label" x="0" y="65">Bob 测量结果</text>
    <text class="tiny" x="0" y="88">(比特值)</text>
    <g class="line">
      <line x1="118" y1="-18" x2="118" y2="92"/>
      <line x1="203" y1="-18" x2="203" y2="92"/>
      <line x1="288" y1="-18" x2="288" y2="92"/>
      <line x1="373" y1="-18" x2="373" y2="92"/>
      <line x1="458" y1="-18" x2="458" y2="92"/>
      <line x1="543" y1="-18" x2="543" y2="92"/>
      <line x1="628" y1="-18" x2="628" y2="92"/>
      <line x1="713" y1="-18" x2="713" y2="92"/>
      <line x1="798" y1="-18" x2="798" y2="92"/>
      <line x1="883" y1="-18" x2="883" y2="92"/>
      <line x1="968" y1="-18" x2="968" y2="92"/>
      <line x1="1053" y1="-18" x2="1053" y2="92"/>
      <line x1="0" y1="36" x2="1088" y2="36"/>
    </g>
    <text class="bit blue" x="160" y="16">＋</text>
    <text class="bit blue" x="245" y="16">＋</text>
    <text class="bit purple" x="330" y="16">×</text>
    <text class="bit blue" x="415" y="16">＋</text>
    <text class="bit purple" x="500" y="16">×</text>
    <text class="bit purple" x="585" y="16">×</text>
    <text class="bit blue" x="670" y="16">＋</text>
    <text class="bit purple" x="755" y="16">×</text>
    <text class="bit purple" x="840" y="16">×</text>
    <text class="bit blue" x="925" y="16">＋</text>
    <text class="bit blue" x="1010" y="16">＋</text>
    <text class="bit purple" x="1095" y="16">×</text>
    <text class="bit" x="160" y="63">0</text>
    <text class="bit" x="245" y="63">1</text>
    <text class="bit" x="330" y="63">1</text>
    <text class="bit" x="415" y="63">1</text>
    <text class="bit" x="500" y="63">1</text>
    <text class="bit" x="585" y="63">0</text>
    <text class="bit" x="670" y="63">1</text>
    <text class="bit" x="755" y="63">0</text>
    <text class="bit" x="840" y="63">0</text>
    <text class="bit" x="925" y="63">0</text>
    <text class="bit" x="1010" y="63">0</text>
    <text class="bit" x="1095" y="63">1</text>
  </g>

  <g transform="translate(300 504)">
    <text class="label" x="0" y="18">基是否一致？</text>
    <text class="label" x="0" y="72">保留的位置</text>
    <text class="bit green" x="160" y="18">✓</text>
    <text class="bit red" x="245" y="18">×</text>
    <text class="bit red" x="330" y="18">×</text>
    <text class="bit green" x="415" y="18">✓</text>
    <text class="bit green" x="500" y="18">✓</text>
    <text class="bit red" x="585" y="18">×</text>
    <text class="bit red" x="670" y="18">×</text>
    <text class="bit green" x="755" y="18">✓</text>
    <text class="bit red" x="840" y="18">×</text>
    <text class="bit green" x="925" y="18">✓</text>
    <text class="bit green" x="1010" y="18">✓</text>
    <text class="bit green" x="1095" y="18">✓</text>
    <rect class="keepBox" x="126" y="48" width="68" height="42"/><text class="keybit" x="160" y="70">1</text>
    <rect class="keepBox" x="381" y="48" width="68" height="42"/><text class="keybit" x="415" y="70">4</text>
    <rect class="keepBox" x="466" y="48" width="68" height="42"/><text class="keybit" x="500" y="70">5</text>
    <rect class="keepBox" x="721" y="48" width="68" height="42"/><text class="keybit" x="755" y="70">8</text>
    <rect class="keepBox" x="891" y="48" width="68" height="42"/><text class="keybit" x="925" y="70">10</text>
    <rect class="keepBox" x="976" y="48" width="68" height="42"/><text class="keybit" x="1010" y="70">11</text>
    <rect class="keepBox" x="1061" y="48" width="68" height="42"/><text class="keybit" x="1095" y="70">12</text>
  </g>

  <g transform="translate(300 622)">
    <text class="label" x="0" y="18">Alice 的比特</text>
    <text class="label" x="0" y="72">Bob 的比特</text>
    <rect class="keepBox" x="126" y="-4" width="68" height="42"/><text class="keybit" x="160" y="18">0</text>
    <rect class="keepBox" x="381" y="-4" width="68" height="42"/><text class="keybit" x="415" y="18">1</text>
    <rect class="keepBox" x="466" y="-4" width="68" height="42"/><text class="keybit" x="500" y="18">1</text>
    <rect class="keepBox" x="721" y="-4" width="68" height="42"/><text class="keybit" x="755" y="18">0</text>
    <rect class="keepBox" x="891" y="-4" width="68" height="42"/><text class="keybit" x="925" y="18">1</text>
    <rect class="keepBox" x="976" y="-4" width="68" height="42"/><text class="keybit" x="1010" y="18">0</text>
    <rect class="keepBox" x="1061" y="-4" width="68" height="42"/><text class="keybit" x="1095" y="18">0</text>
    <rect class="keepBox" x="126" y="50" width="68" height="42"/><text class="keybit" x="160" y="72">0</text>
    <rect class="keepBox" x="381" y="50" width="68" height="42"/><text class="keybit" x="415" y="72">1</text>
    <rect class="keepBox" x="466" y="50" width="68" height="42"/><text class="keybit" x="500" y="72">1</text>
    <rect class="keepBox" x="721" y="50" width="68" height="42"/><text class="keybit" x="755" y="72">0</text>
    <rect class="keepBox" x="891" y="50" width="68" height="42"/><text class="keybit" x="925" y="72">0</text>
    <rect class="keepBox" x="976" y="50" width="68" height="42"/><text class="keybit" x="1010" y="72">0</text>
    <rect class="keepBox" x="1061" y="50" width="68" height="42"/><text class="keybit" x="1095" y="72">0</text>
  </g>

  <!-- Right legend -->
  <rect x="1415" y="220" width="150" height="290" rx="10" fill="#fffdf7" stroke="#d99a5c"/>
  <text class="label" x="1430" y="250">图例说明</text>
  <circle class="orange" cx="1445" cy="280" r="9"/><text class="small" x="1470" y="286">光子/量子态</text>
  <text class="bit blue" x="1445" y="320">＋</text><text class="small" x="1470" y="326">直线基</text>
  <text class="bit purple" x="1445" y="360">×</text><text class="small" x="1470" y="366">对角基</text>
  <text class="bit green" x="1445" y="402">✓</text><text class="small" x="1470" y="408">保留</text>
  <text class="bit red" x="1445" y="444">×</text><text class="small" x="1470" y="450">丢弃/错误</text>
  <text class="tiny" x="1430" y="482">基一致：保留</text>
  <text class="tiny" x="1430" y="502">基不一致：丢弃</text>

  <rect x="1415" y="612" width="150" height="90" rx="10" fill="#f7fff7" stroke="#9bd39c" stroke-dasharray="6 4"/>
  <text class="small" x="1430" y="640">原始密钥示例</text>
  <text class="keybit" x="1490" y="676">0 1 1 0 1 0 0</text>
</svg>
